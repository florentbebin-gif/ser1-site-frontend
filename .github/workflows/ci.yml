name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

env:
  VITE_SUPABASE_URL: https://placeholder.supabase.co
  VITE_SUPABASE_ANON_KEY: placeholder-key-for-build

jobs:
  checks:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Guard forbidden env files
        shell: bash
        run: |
          set -euo pipefail
          allow='.env.example'
          for f in .env .env.*; do
            if [[ "$f" == "$allow" ]]; then
              continue
            fi
            if [[ -f "$f" ]]; then
              echo "ERROR: forbidden env file present in repo checkout: $f" >&2
              exit 1
            fi
          done
          tracked_env_files=$(git ls-files -- '.env' '.env.*' | grep -v '^\.env\.example$' || true)
          if [[ -n "$tracked_env_files" ]]; then
            echo "ERROR: forbidden env file(s) tracked by git:" >&2
            echo "$tracked_env_files" >&2
            exit 1
          fi

      - name: Run pre-merge guard
        shell: pwsh
        run: ./scripts/pre-merge-check.ps1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.1'
          cache: 'npm'

      - name: Pin npm version
        run: |
          npm install -g npm@11.12.0
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run static checks
        run: npm run check:static

      - name: Run architecture checks
        run: npm run check:architecture

      - name: Run fiscal checks
        run: npm run check:fiscal

      - name: Run Supabase checks
        run: npm run check:supabase

      - name: Run export checks
        run: npm run check:exports

      - name: Run baseline checks
        run: npm run check:baselines

      - name: Run app typecheck
        run: npm run check:types

      - name: Run repository lint
        run: npm run lint:repo

      - name: Run test typecheck
        run: npm run typecheck:tests

      - name: Run Node config typecheck
        run: npm run typecheck:node

  tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.1'
          cache: 'npm'

      - name: Pin npm version
        run: |
          npm install -g npm@11.12.0
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run check:tests

  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.1'
          cache: 'npm'

      - name: Pin npm version
        run: |
          npm install -g npm@11.12.0
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run check:build

  deno-admin:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect admin function changes
        id: changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          should_run="false"
          if [[ "$EVENT_NAME" == "merge_group" ]]; then
            should_run="true"
          elif [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            should_run="true"
          else
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed-files.txt
            if grep -E '^(supabase/functions/|supabase/migrations/|package(-lock)?\.json|\.github/workflows/(ci|deploy-supabase-functions)\.yml)$' changed-files.txt; then
              should_run="true"
            fi
          fi

          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"
          echo "Deno admin tests required: ${should_run}"

      - name: No-op outside admin function scope
        if: steps.changes.outputs.should_run != 'true'
        run: echo "Aucun changement Deno/admin détecté; job sentinelle vert."

      - name: Setup Deno
        if: steps.changes.outputs.should_run == 'true'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node.js
        if: steps.changes.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.1'

      - name: Run admin function tests
        if: steps.changes.outputs.should_run == 'true'
        run: npm run test:deno
