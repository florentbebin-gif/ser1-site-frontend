name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    strategy:
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 'Guard: forbid committed env files'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          # Allowed template
          allow='.env.example'

          # Fail if any .env* file exists in the repo root checkout (except .env.example)
          for f in .env .env.*; do
            if [[ "$f" == "$allow" ]]; then
              continue
            fi
            if [[ -f "$f" ]]; then
              echo "ERROR: forbidden env file present in repo checkout: $f" >&2
              echo "Use .env.local locally (gitignored) and keep only .env.example in the repo." >&2
              exit 1
            fi
          done

          # Fail if any forbidden env file is tracked by git
          tracked_env_files=$(git ls-files -- '.env' '.env.*' | grep -v '^\.env\.example$' || true)
          if [[ -n "$tracked_env_files" ]]; then
            echo "ERROR: forbidden env file(s) tracked by git:" >&2
            echo "$tracked_env_files" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.1'
          cache: 'npm'

      - name: Pin npm version
        run: |
          npm install -g npm@10.9.8
          npm --version

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Run pre-merge guard
        run: npm run check:pre-merge

      - name: Run all checks
        run: npm run check
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key-for-build

      - name: Run repo lint
        run: npm run lint:repo

      - name: Typecheck tests and tooling
        run: npm run typecheck:tests

      - name: Run admin function tests (Deno)
        run: npm run test:deno

      - name: Run production audit (informative)
        run: npm run audit:prod || echo "::warning::audit:prod non bloquant pour la première stabilisation"

      - name: Run engine coverage (informative)
        run: npm run coverage || echo "::warning::coverage non bloquante pour la première stabilisation"

      - name: Build Storybook (informative)
        run: npm run build:storybook || echo "::warning::Storybook non bloquant pour la première stabilisation"

      - name: Generate bundle stats (informative)
        run: npm run analyze:ci || echo "::warning::stats bundle non bloquantes pour la première stabilisation"
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key-for-build

      - name: Upload bundle stats (informative)
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: dist/bundle-stats.html
          if-no-files-found: warn

      - name: Upload coverage (informative)
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run Lighthouse CI (informative)
        run: npm run lhci || echo "::warning::Lighthouse CI non bloquant pour la première stabilisation"

      - name: Run no-console guard
        run: npm run check:no-console
