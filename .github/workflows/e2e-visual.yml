name: E2E Visual

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
  schedule:
    # 04:00 UTC, du lundi au vendredi.
    - cron: '0 4 * * 1-5'

permissions:
  contents: read

jobs:
  e2e-visual:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect visual scope
        id: visual_scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          should_run="true"
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            should_run="false"
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed-files.txt
            if grep -E '^(src/|public/|tests/e2e/)|^(playwright\.config\.ts|package(-lock)?\.json|\.github/workflows/(e2e|e2e-visual)\.yml)$|\.css$' changed-files.txt; then
              should_run="true"
            fi
          fi

          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"
          echo "Visual E2E required: ${should_run}"

      - name: No-op outside visual scope
        if: steps.visual_scope.outputs.should_run != 'true'
        run: echo "Aucun changement UI/visuel détecté; job sentinelle vert."

      - name: Run visual snapshots in Playwright container
        if: steps.visual_scope.outputs.should_run == 'true'
        timeout-minutes: 15
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_EMAIL: ${{ vars.E2E_AUTH_REQUIRED == 'true' && secrets.E2E_EMAIL || '' }}
          E2E_PASSWORD: ${{ vars.E2E_AUTH_REQUIRED == 'true' && secrets.E2E_PASSWORD || '' }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            -e CI=true \
            -e VITE_E2E=true \
            -e HUSKY=0 \
            -e VITE_SUPABASE_URL="${VITE_SUPABASE_URL}" \
            -e VITE_SUPABASE_ANON_KEY="${VITE_SUPABASE_ANON_KEY}" \
            -e E2E_EMAIL="${E2E_EMAIL}" \
            -e E2E_PASSWORD="${E2E_PASSWORD}" \
            mcr.microsoft.com/playwright:v1.60.0-jammy \
            bash -lc "npm install -g n >/dev/null && n 22.22.1 >/dev/null && hash -r && npm install -g npm@11.12.0 >/dev/null && npm ci && npm run test:e2e:visual"

      - name: Upload visual test report
        uses: actions/upload-artifact@v6
        if: always() && steps.visual_scope.outputs.should_run == 'true'
        with:
          name: playwright-visual-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
