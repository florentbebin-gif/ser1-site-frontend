name: E2E Visual

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
  schedule:
    # 04:00 UTC, du lundi au vendredi.
    - cron: '0 4 * * 1-5'

permissions:
  contents: read

jobs:
  e2e-visual:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect visual scope
        id: visual_scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          should_run="true"
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            should_run="false"
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed-files.txt
            if grep -E '^(src/|public/|tests/e2e/)|^(playwright\.config\.ts|package(-lock)?\.json|\.github/workflows/(e2e|e2e-visual)\.yml)$|\.css$' changed-files.txt; then
              should_run="true"
            fi
          fi

          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"
          echo "Visual E2E required: ${should_run}"

      - name: No-op outside visual scope
        if: steps.visual_scope.outputs.should_run != 'true'
        run: echo "Aucun changement UI/visuel détecté; job sentinelle vert."

      - name: Setup Node
        if: steps.visual_scope.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm

      - name: Cache Playwright browsers
        if: steps.visual_scope.outputs.should_run == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.60.0

      - name: Pin npm version
        if: steps.visual_scope.outputs.should_run == 'true'
        run: |
          npm install -g npm@11.12.0
          npm --version

      - name: Install dependencies
        if: steps.visual_scope.outputs.should_run == 'true'
        run: npm ci

      - name: Install Chromium
        if: steps.visual_scope.outputs.should_run == 'true'
        run: npx playwright install chromium --with-deps

      - name: Run visual snapshots
        if: steps.visual_scope.outputs.should_run == 'true'
        timeout-minutes: 15
        env:
          CI: true
          VITE_E2E: 'true'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_EMAIL: ${{ vars.E2E_AUTH_REQUIRED == 'true' && secrets.E2E_EMAIL || '' }}
          E2E_PASSWORD: ${{ vars.E2E_AUTH_REQUIRED == 'true' && secrets.E2E_PASSWORD || '' }}
        run: npm run test:e2e:visual

      - name: Upload visual test report
        uses: actions/upload-artifact@v6
        if: always() && steps.visual_scope.outputs.should_run == 'true'
        with:
          name: playwright-visual-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
