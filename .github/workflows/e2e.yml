name: E2E Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  e2e-functional:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.60.0

      - name: Pin npm version
        run: |
          npm install -g npm@11.12.0
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Check repository context
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Head repo: ${{ github.event.pull_request.head.repo.full_name }}"
          echo "Base repo: ${{ github.repository }}"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "PR from fork detected - secrets may not be available"
          else
            echo "Internal PR, merge queue or trusted event"
          fi

      - name: Validate environment
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ]; then
            echo "Warning: VITE_SUPABASE_URL secret not set"
          fi
          if [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "Warning: VITE_SUPABASE_ANON_KEY secret not set"
          fi
          if [ "${{ vars.E2E_AUTH_REQUIRED }}" = "true" ]; then
            if [ -z "${{ secrets.E2E_EMAIL }}" ] || [ -z "${{ secrets.E2E_PASSWORD }}" ]; then
              echo "E2E_AUTH_REQUIRED=true mais E2E_EMAIL/E2E_PASSWORD ne sont pas configurés"
              exit 1
            fi
            echo "Specs authentifiées activées"
          else
            echo "Specs authentifiées désactivées; définir E2E_AUTH_REQUIRED=true avec un compte Supabase valide pour les activer"
          fi

      - name: Vérifier Playwright
        run: |
          node --version
          npm --version
          npx playwright --version

      - name: Lancer les E2E fonctionnels Chromium
        timeout-minutes: 10
        run: npm run test:e2e:functional
        env:
          CI: true
          VITE_E2E: 'true'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_EMAIL: ${{ vars.E2E_AUTH_REQUIRED == 'true' && secrets.E2E_EMAIL || '' }}
          E2E_PASSWORD: ${{ vars.E2E_AUTH_REQUIRED == 'true' && secrets.E2E_PASSWORD || '' }}

      - name: Upload test report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-functional-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
