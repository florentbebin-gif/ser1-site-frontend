name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm

      - name: Pin npm version
        run: |
          npm install -g npm@10.9.8
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Check repository context
        run: |
          echo "🔍 Event: ${{ github.event_name }}"
          echo "🔍 Head repo: ${{ github.event.pull_request.head.repo.full_name }}"
          echo "🔍 Base repo: ${{ github.repository }}"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "🔄 PR from fork detected - secrets may not be available"
          else
            echo "🔐 Internal PR or push - full secrets available"
          fi

      - name: Validate environment
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ]; then
            echo "⚠️ Warning: VITE_SUPABASE_URL secret not set"
          fi
          if [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "⚠️ Warning: VITE_SUPABASE_ANON_KEY secret not set"
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E tests
        timeout-minutes: 10
        run: npm run test:e2e:smoke
        env:
          CI: true
          VITE_E2E: 'true'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload test report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
