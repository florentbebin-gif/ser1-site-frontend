name: Quality reports

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 03:00 UTC, du lundi au vendredi.
    - cron: '0 3 * * 1-5'

permissions:
  actions: read
  contents: read

jobs:
  flakiness-report:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - name: Compute 7-day workflow stability
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          since="$(date -u -d '7 days ago' +'%Y-%m-%dT%H:%M:%SZ')"
          if ! runs="$(gh api --method GET "repos/${REPO}/actions/workflows/quality-reports.yml/runs" -f branch=main -f created=">=${since}" -f per_page=100)"; then
            {
              echo "### Quality reports — stabilité 7 jours"
              echo ""
              echo "- Rapport indisponible : l'appel GitHub Actions API a échoué."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          total="$(echo "${runs}" | jq '.workflow_runs | length')"
          success="$(echo "${runs}" | jq '[.workflow_runs[] | select(.conclusion == "success")] | length')"
          failure="$(echo "${runs}" | jq '[.workflow_runs[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled")] | length')"
          {
            echo "### Quality reports — stabilité 7 jours"
            echo ""
            echo "- Runs analysés : ${total}"
            echo "- Succès : ${success}"
            echo "- Échecs/timeouts/cancelled : ${failure}"
          } >> "${GITHUB_STEP_SUMMARY}"

  quality-reports:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.1'
          cache: 'npm'

      - name: Pin npm version
        run: |
          npm install -g npm@11.12.0
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run engine coverage
        run: npm run coverage

      - name: Build Storybook
        run: npm run build:storybook

      - name: Build app for reports
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key-for-build

      - name: Generate bundle stats
        run: npm run analyze:ci
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key-for-build

      - name: Upload bundle stats
        uses: actions/upload-artifact@v7
        with:
          name: bundle-stats
          path: dist/bundle-stats.html
          if-no-files-found: error

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run Lighthouse CI
        continue-on-error: true
        run: npm run lhci
        env:
          LHCI_PROFILE: full
          LHCI_RUNS: 3
