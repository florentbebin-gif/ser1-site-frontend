name: Deploy Supabase Functions

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: Fonction Supabase a deployer
        required: true
        default: admin
        type: choice
        options:
          - admin

permissions:
  contents: read

concurrency:
  group: supabase-functions-${{ github.event.inputs.function_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.function_name }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.1'
          cache: npm

      - name: Pin npm version
        run: |
          npm install -g npm@11.12.0
          npm --version

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Run admin function tests
        run: npm run test:deno

      - name: Validate Supabase deployment secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN is not configured" >&2
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "SUPABASE_PROJECT_REF is not configured" >&2
            exit 1
          fi

      - name: Prepare linked Supabase project
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          mkdir -p supabase/.temp
          printf "%s" "$SUPABASE_PROJECT_REF" > supabase/.temp/project-ref

      - name: Verify usable admin allowlist
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          cat > /tmp/verify-admin-allowlist.sql <<'SQL'
          do $$
          declare
            usable_admins integer;
          begin
            select count(*)
              into usable_admins
            from public.admin_accounts a
            join auth.users u on u.id = a.user_id
            where a.status = 'active'
              and (a.expires_at is null or a.expires_at > now())
              and coalesce(u.raw_app_meta_data->>'role', 'user') = 'admin';

            if usable_admins = 0 then
              raise exception 'No usable admin account: add an active admin user to public.admin_accounts before deploying admin Edge Function';
            end if;
          end
          $$;
          SQL
          npx supabase db query --linked --file /tmp/verify-admin-allowlist.sql

      - name: List deployed functions before deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npx supabase functions list --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npx supabase functions deploy ${{ github.event.inputs.function_name }} --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: List deployed functions after deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npx supabase functions list --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
